# Local-only override: the published ghcr.io operator-ui image is not publicly
# pullable, so build the UI from local source instead (same Dockerfile that
# docker-compose.local.yml uses). Not for commit upstream.
services:
  # Build the server from local source too: the published :latest image lags the
  # repo (missing migrations >= 20260427, e.g. ocppConnectionName rename) and the
  # locally-built operator UI queries the newer schema.
  citrine:
    image: citrineos-server:local
    pull_policy: never
    build:
      context: .
      dockerfile: ./apps/Server/deploy.Dockerfile

  citrine-ui:
    image: citrineos-operator-ui:local
    pull_policy: never
    build:
      context: .
      dockerfile: apps/operator-ui/Dockerfile
      args:
        # Baked into the client bundle at build time (see Dockerfile). The
        # browser hits these same-origin paths, which nginx proxies to Hasura
        # (:8090) and core (:8080). Same origin => no CORS.
        NEXT_PUBLIC_API_URL: https://csms-test.ivoracharge.com/hasura/v1/graphql
        NEXT_PUBLIC_WS_URL: wss://csms-test.ivoracharge.com/hasura/v1/graphql
        NEXT_PUBLIC_CITRINE_CORE_URL: https://csms-test.ivoracharge.com/core-api
        # Payment service base URL used (server-side) by the catalog sync action.
        # 172.18.0.1 is the docker bridge gateway -> host:9010 (payment service),
        # reachable from this container. NEXT_PUBLIC_* must be a build arg so Next
        # inlines it. Public alt: https://payment-test.ivoracharge.com
        NEXT_PUBLIC_PAYMENT_SERVICE_URL: http://172.18.0.1:9010
    environment:
      # Server-only shared secret for /api/catalog/sync (read at runtime by the
      # syncPaymentCatalog server action). Must match the payment service's
      # PAYMENT_CATALOG_SYNC_SECRET. Never baked into the client bundle.
      PAYMENT_CATALOG_SYNC_SECRET: "e2e-test-secret"
      NEXT_PUBLIC_PAYMENT_SERVICE_URL: http://172.18.0.1:9010
      # Generic auth provider credentials (local dev only)
      NEXT_PUBLIC_ADMIN_EMAIL: admin@citrineos.com
      ADMIN_PASSWORD: "CitrineOS!"
      NEXTAUTH_SECRET: "local-dev-secret-2b1fc16ee76818bf"
      # Must be the public URL or NextAuth callbacks/cookies break.
      NEXTAUTH_URL: https://csms-test.ivoracharge.com
      # Also provided at runtime for any server-side reads of the same config.
      NEXT_PUBLIC_API_URL: https://csms-test.ivoracharge.com/hasura/v1/graphql
      NEXT_PUBLIC_WS_URL: wss://csms-test.ivoracharge.com/hasura/v1/graphql
      NEXT_PUBLIC_CITRINE_CORE_URL: https://csms-test.ivoracharge.com/core-api
      # Google Maps: replace with your real keys from Google Cloud Console.
      # GOOGLE_MAPS_API_KEY = map rendering; GOOGLE_MAPS_ADDRESS_API_KEY = geocoding/address lookup.
      GOOGLE_MAPS_API_KEY: "AIzaSyDNIxJptezylHwTwvwJkxyoY0pD_z3DMEw"
      GOOGLE_MAPS_ADDRESS_API_KEY: "AIzaSyDNIxJptezylHwTwvwJkxyoY0pD_z3DMEw"
