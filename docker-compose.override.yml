# Local-only override: the published ghcr.io operator-ui image is not publicly
# pullable, so build the UI from local source instead (same Dockerfile that
# docker-compose.local.yml uses). Not for commit upstream.
services:
  # Build the server from local source too: the published :latest image lags the
  # repo (missing migrations >= 20260427, e.g. ocppConnectionName rename) and the
  # locally-built operator UI queries the newer schema.
  citrine:
    image: citrineos-server:local
    pull_policy: never
    build:
      context: .
      dockerfile: ./apps/Server/deploy.Dockerfile

  citrine-ui:
    image: citrineos-operator-ui:local
    pull_policy: never
    build:
      context: .
      dockerfile: apps/operator-ui/Dockerfile
    environment:
      # Generic auth provider credentials (local dev only)
      NEXT_PUBLIC_ADMIN_EMAIL: admin@citrineos.com
      ADMIN_PASSWORD: "CitrineOS!"
      NEXTAUTH_SECRET: "local-dev-secret-2b1fc16ee76818bf"
      NEXTAUTH_URL: http://localhost:3000
      # Google Maps: replace with your real keys from Google Cloud Console.
      # GOOGLE_MAPS_API_KEY = map rendering; GOOGLE_MAPS_ADDRESS_API_KEY = geocoding/address lookup.
      GOOGLE_MAPS_API_KEY: "AIzaSyDNIxJptezylHwTwvwJkxyoY0pD_z3DMEw"
      GOOGLE_MAPS_ADDRESS_API_KEY: "AIzaSyDNIxJptezylHwTwvwJkxyoY0pD_z3DMEw"
